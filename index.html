<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Cassette</title>
</head>

<body class="grainy-background">
  <div class="content">

    <div class="player">
      <div class="button pause" id="btn-pause">PAUSE</div>
      <div class="button back" id="btn-back">BACK</div>
      <div class="button forward" id="btn-fwd">FORWARD</div>
      <div class="button play" id="btn-play">PLAY</div>
      <div class="text">BORN FOR MUSIC</div>

      <div class="volume">
        <div class="knob" id="vlm-knob">
          <div class="slider" id="vlm-slider">
            <div class="notch"></div>
          </div>
        </div>
      </div>

      <div class="cassette" id="cassette-tape">
        <div class="disc circle1">
          <div class="inner-silver-ring">
            <div class="white-hub">
              <div class="spoke s1"></div>
              <div class="spoke s2"></div>
              <div class="spoke s3"></div>
              <div class="center-hole"></div>
            </div>
          </div>
        </div>
        <div class="disc circle2">
          <div class="inner-silver-ring">
            <div class="white-hub">
              <div class="spoke s1"></div>
              <div class="spoke s2"></div>
              <div class="spoke s3"></div>
              <div class="center-hole"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="progress-wrapper" id="progress-wrapper">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

  </div>

  <div class="volume-popup" id="vlm-popup">
    <div>
      <span class="volume-value" id="vlm-value">0</span>
    </div>
    <div class="volume-bar">
      <div class="volume-fill" id="vlm-fill"></div>
    </div>
  </div>

  <script>
    const playBtn = document.getElementById("btn-play");
    const pauseBtn = document.getElementById("btn-pause");
    const fwdBtn = document.getElementById("btn-fwd");
    const backBtn = document.getElementById("btn-back");
    const cassetteTape = document.getElementById("cassette-tape");
    const progressWrapper = document.getElementById("progress-wrapper");
    const progressBar = document.getElementById("progress-bar");

    let progress = 0;
    let progressInterval = null;
    let isScrubbing = false;

    const setProgressSpeed = (speedStep) => {
      clearInterval(progressInterval);
      if (speedStep === 0) return;

      progressInterval = setInterval(() => {
        if (isScrubbing) return;

        progress += speedStep;

        if (progress >= 100) {
          progress = 100;
          activatePause();
        } else if (progress <= 0) {
          progress = 0;
          activatePause();
        }

        progressBar.style.width = progress + "%";
      }, 50);
    };

    const activatePlay = () => {
      if (progress >= 100) progress = 0;
      playBtn.classList.add("pressed");
      pauseBtn.classList.remove("pressed");
      cassetteTape.classList.remove("is-forwarding", "is-rewinding");
      cassetteTape.classList.add("is-playing");
      setProgressSpeed(0.07);
    };

    const activatePause = () => {
      pauseBtn.classList.add("pressed");
      playBtn.classList.remove("pressed");
      cassetteTape.classList.remove("is-playing", "is-forwarding", "is-rewinding");
      setProgressSpeed(0);
    };

    const stopPause = () => {
      pauseBtn.classList.remove("pressed");
    };

    const activateForward = () => {
      fwdBtn.classList.add("pressed");
      cassetteTape.classList.remove("is-playing");
      cassetteTape.classList.add("is-forwarding");
      setProgressSpeed(1.5);
    };

    const stopForward = () => {
      fwdBtn.classList.remove("pressed");
      cassetteTape.classList.remove("is-forwarding");
      setProgressSpeed(0);
    };

    const activateBackward = () => {
      backBtn.classList.add("pressed");
      cassetteTape.classList.remove("is-playing");
      cassetteTape.classList.add("is-rewinding");
      setProgressSpeed(-1.5);
    };

    const stopBackward = () => {
      backBtn.classList.remove("pressed");
      cassetteTape.classList.remove("is-rewinding");
      setProgressSpeed(0);
    };

    playBtn.addEventListener("click", activatePlay);

    pauseBtn.addEventListener("mousedown", activatePause);
    pauseBtn.addEventListener("mouseup", stopPause);
    pauseBtn.addEventListener("mouseleave", stopPause);

    fwdBtn.addEventListener("mousedown", activateForward);
    fwdBtn.addEventListener("mouseup", stopForward);
    fwdBtn.addEventListener("mouseleave", stopForward);

    backBtn.addEventListener("mousedown", activateBackward);
    backBtn.addEventListener("mouseup", stopBackward);
    backBtn.addEventListener("mouseleave", stopBackward);

    document.body.addEventListener("keydown", (e) => {
      if (e.repeat) return;

      if (["Space", "ArrowRight", "ArrowLeft"].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === "Space") {
        if (playBtn.classList.contains("pressed")) activatePause();
        else activatePlay();
      } else if (e.code === "ArrowRight") {
        activateForward();
      } else if (e.code === "ArrowLeft") {
        activateBackward();
      }
    });

    document.body.addEventListener("keyup", (e) => {
      if (["Space", "ArrowRight", "ArrowLeft"].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === "Space") {
        stopPause();
      } else if (e.code === "ArrowRight") {
        stopForward();
      } else if (e.code === "ArrowLeft") {
        stopBackward();
      }
    });

    function handleScrub(e) {
      const rect = progressWrapper.getBoundingClientRect();
      let x = e.clientX - rect.left;
      x = Math.max(0, Math.min(x, rect.width));

      progress = (x / rect.width) * 100;
      progressBar.style.width = progress + "%";

      if (progress >= 100 || progress <= 0) {
        activatePause();
      }
    }

    progressWrapper.addEventListener('mousedown', (e) => {
      isScrubbing = true;
      activatePause();
      handleScrub(e);
    });

    document.addEventListener('mousemove', (e) => {
      if (isScrubbing) handleScrub(e);
    });

    document.addEventListener('mouseup', () => {
      isScrubbing = false;
    });

    const slider = document.getElementById("vlm-slider");
    const knob = document.getElementById("vlm-knob");
    const volumePopup = document.getElementById("vlm-popup");
    const volumeValue = document.getElementById("vlm-value");
    const volumeFill = document.getElementById("vlm-fill");

    let hidePopupTimeout;

    function showVolumePopup() {
      volumePopup.classList.add("show");
      clearTimeout(hidePopupTimeout);
      hidePopupTimeout = setTimeout(() => {
        volumePopup.classList.remove("show");
      }, 1500);
    }

    function updateVolumeDisplay(percentage) {
      volumeValue.textContent = Math.round(percentage);
      volumeFill.style.height = percentage + "%";
    }

    knob.onmousedown = (event) => {
      event.preventDefault();
      if (event.button !== 0) return;

      const maxTop = knob.clientHeight - slider.clientHeight;
      const startY = event.clientY;
      const startTop = parseFloat(slider.style.top) || 0;

      function moveTo(e) {
        let newTop = startTop + (e.clientY - startY);
        if (newTop > maxTop) newTop = maxTop;
        if (newTop < 0) newTop = 0;
        slider.style.top = newTop + "px";

        const percentage = ((maxTop - newTop) / maxTop) * 100;
        updateVolumeDisplay(percentage);
        showVolumePopup();
      }

      function onMouseUp(e) {
        if (e.button !== 0) return;
        document.removeEventListener("mousemove", moveTo);
        document.removeEventListener("mouseup", onMouseUp);
      }

      document.addEventListener("mousemove", moveTo);
      document.addEventListener("mouseup", onMouseUp);

      const currentTop = parseFloat(slider.style.top) || 0;
      const currentPercentage = ((maxTop - currentTop) / maxTop) * 100;
      updateVolumeDisplay(currentPercentage);
      showVolumePopup();
    };
  </script>
</body>

</html>
